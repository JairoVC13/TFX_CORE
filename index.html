<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCADA CORES MOBILE</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f8;
  margin:0;
  padding:10px;
  color:#1f2937;
}

/* TÍTULO */
h1{
  text-align:center;
  color:#16a34a;
  font-size:20px;
  margin:10px 0;
}

/* TARJETAS VERTICALES */
.card{
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* INPUTS GRANDES PARA CELULAR */
input, select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:1px solid #d1d5db;
  border-radius:8px;
  font-size:16px;
}

/* BOTONES GRANDES */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  background:#16a34a;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
}

button:active{
  background:#15803d;
}

/* ESTADÍSTICAS VERTICALES */
.stat{
  background:white;
  padding:12px;
  margin-bottom:8px;
  border-left:6px solid #16a34a;
  border-radius:8px;
  font-weight:bold;
}

/* TABLA RESPONSIVA SIMPLE */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  font-size:14px;
}

th,td{
  border:1px solid #e5e7eb;
  padding:6px;
  text-align:center;
}

th{
  background:#16a34a;
  color:white;
  font-size:13px;
}

/* ALERTA STOCK BAJO */
.low{
  background:#fee2e2;
  color:#991b1b;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>CONTROL CORES</h1>

<!-- ESTADÍSTICAS -->
<div class="stat" id="total">Stock Total: 0</div>
<div class="stat" id="nuevo">Nuevo: 0</div>
<div class="stat" id="se">SE: 0</div>

<!-- FORMULARIO -->
<div class="card">
<h3>Movimiento</h3>

<select id="tipo">
  <option>Ingreso</option>
  <option>Consumo</option>
</select>

<input type="number" step="0.1" id="pared" placeholder="Pared (ej 9.5)">
<input type="number" id="largo" placeholder="Largo (mm)">

<select id="estado">
  <option>Nuevo</option>
  <option>SE</option>
</select>

<input type="number" id="cantidad" placeholder="Cantidad">

<button onclick="enviar()">Registrar</button>
</div>

<!-- FILTROS -->
<div class="card">
<h3>Filtros</h3>

<input type="number" step="0.1" id="f_pared" placeholder="Pared">
<input type="number" id="f_largo" placeholder="Largo">

<select id="f_estado">
  <option value="">Todos</option>
  <option>Nuevo</option>
  <option>SE</option>
</select>

<button onclick="cargarInventario()">Filtrar</button>
</div>

<!-- TABLA -->
<div class="card">
<table>
<thead>
<tr>
<th>P</th>
<th>L</th>
<th>E</th>
<th>S</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycby0H4u6rFX1WdJWLpFq6_u1hL4FLeZGUkeJLuT5y3Iiy-ZD6fhDQ3lL4PLVvTAHY8Ea/exec";

/* ENVIAR */
function enviar(){

const data={
 tipo:document.getElementById("tipo").value,
 pared:document.getElementById("pared").value,
 largo:document.getElementById("largo").value,
 estado:document.getElementById("estado").value,
 cantidad:document.getElementById("cantidad").value
};

fetch(API_URL,{
 method:"POST",
 body:JSON.stringify(data)
})
.then(r=>r.json())
.then(res=>{
 alert(res.mensaje);
 cargarInventario();
 cargarEstadisticas();
});

}

/* INVENTARIO */
function cargarInventario(){

fetch(API_URL+"?action=obtenerInventario")
.then(r=>r.json())
.then(res=>{

const t=document.getElementById("tabla");
t.innerHTML="";

let fp=document.getElementById("f_pared").value;
let fl=document.getElementById("f_largo").value;
let fe=document.getElementById("f_estado").value;

res.data.forEach(i=>{

let ok=true;
if(fp && i.pared!=fp) ok=false;
if(fl && i.largo!=fl) ok=false;
if(fe && i.estado!=fe) ok=false;

if(ok){

let cls=i.stock<=10?"low":"";

t.innerHTML+=`
<tr class="${cls}">
<td>${i.pared}</td>
<td>${i.largo}</td>
<td>${i.estado}</td>
<td>${i.stock}</td>
</tr>`;
}

});

});

}

/* ESTADISTICAS */
function cargarEstadisticas(){

fetch(API_URL+"?action=obtenerEstadisticas")
.then(r=>r.json())
.then(res=>{

document.getElementById("total").innerText="Stock Total: "+res.totalStock;
document.getElementById("nuevo").innerText="Nuevo: "+res.nuevo;
document.getElementById("se").innerText="SE: "+res.se;

});

}

cargarInventario();
cargarEstadisticas();

</script>

</body>
</html>
